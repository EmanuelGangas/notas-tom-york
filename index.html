<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <title>Notas Tom York</title>
    
    <!-- Fuentes modernas de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Reset moderno */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Variables de colores morados */
        :root {
            --purple-dark: #2d1b35;
            --purple-primary: #4a1c40;
            --purple-medium: #6b2d5c;
            --purple-light: #8b3a6d;
            --purple-vibrant: #9b4d8a;
            --purple-pale: #b87a9e;
            --purple-faint: #d4a5c9;
            --lavender: #f0e6f2;
            --lavender-light: #f8f4f9;
            --white: #ffffff;
            --gradient-1: linear-gradient(135deg, #2d1b35 0%, #4a1c40 25%, #6b2d5c 50%, #4a1c40 75%, #2d1b35 100%);
            --gradient-2: linear-gradient(145deg, #f8f4f9 0%, #f0e6f2 100%);
            --gradient-3: linear-gradient(135deg, #4a1c40 0%, #6b2d5c 50%, #8b3a6d 100%);
            --gradient-4: linear-gradient(145deg, #6b2d5c 0%, #8b3a6d 100%);
        }

        /* Body optimizado para móviles */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--gradient-1);
            min-height: 100vh;
            padding: 15px;
            line-height: 1.6;
            color: var(--purple-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-size: 16px;
            touch-action: manipulation;
        }

        /* Container responsivo */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--gradient-2);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(45, 27, 53, 0.6);
            border: 3px solid var(--purple-vibrant);
            width: 100%;
            overflow: hidden;
        }

        /* Header con imagen */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-image {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 20px;
            border: 4px solid var(--purple-vibrant);
            box-shadow: 0 10px 40px rgba(91, 45, 100, 0.4);
            object-fit: cover;
            display: block;
            background: var(--lavender-light);
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            color: var(--purple-primary);
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(91, 45, 100, 0.3);
            border-bottom: 3px solid var(--purple-vibrant);
            padding-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Subtítulo opcional */
        .subtitle {
            font-family: 'Nunito', sans-serif;
            color: var(--purple-medium);
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            font-weight: 600;
            margin-top: 10px;
        }

        /* notas-container */
        .notes-container {
            margin-bottom: 25px;
            width: 100%;
        }

        /* Casilla responsiva */
        .note-row {
            display: grid;
            grid-template-columns: 1fr 1fr 45px;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
            background: var(--white);
            padding: 18px;
            border-radius: 16px;
            border: 2px solid var(--purple-faint);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .note-row:hover {
            box-shadow: 0 8px 30px rgba(91, 45, 100, 0.2);
            border-color: var(--purple-vibrant);
            transform: translateY(-2px);
        }

        .note-row label {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            color: var(--purple-primary);
            margin-bottom: 8px;
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            display: block;
        }

        /* Input optimizado para móviles */
        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--purple-faint);
            border-radius: 12px;
            font-size: clamp(1rem, 2.5vw, 1.1rem);
            background: var(--lavender-light);
            transition: all 0.3s;
            color: var(--purple-primary);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            height: 50px;
            -webkit-appearance: none;
            appearance: none;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--purple-medium);
            box-shadow: 0 0 12px rgba(107, 45, 92, 0.4);
            background: var(--white);
        }

        .input-group input::placeholder {
            color: var(--purple-pale);
            font-style: italic;
        }

        .input-group span {
            color: var(--purple-medium);
            font-weight: 700;
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            font-family: 'Nunito', sans-serif;
            min-width: 20px;
        }

        /* Botón eliminar */
        .btn-delete {
            background: var(--purple-medium);
            color: var(--white);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(91, 45, 100, 0.3);
        }

        .btn-delete:hover:not(:disabled) {
            background: var(--purple-primary);
            transform: scale(1.15);
            box-shadow: 0 6px 20px rgba(91, 45, 100, 0.4);
        }

        .btn-delete:disabled {
            background: var(--purple-faint);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Buttons container responsivo */
        .buttons-container {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            width: 100%;
        }

        /* Botones optimizados paratouch */
        .btn {
            padding: 16px 28px;
            border: none;
            border-radius: 14px;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.5px;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add {
            background: var(--gradient-4);
            color: var(--white);
            border: 2px solid var(--purple-vibrant);
            flex: 1;
            min-width: 140px;
        }

        .btn-add:hover {
            background: linear-gradient(145deg, #4a1c40 0%, #6b2d5c 100%);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(107, 45, 92, 0.5);
        }

        .btn-calculate {
            background: var(--gradient-3);
            color: var(--white);
            flex: 2;
            border: 2px solid var(--purple-vibrant);
            min-width: 180px;
        }

        .btn-calculate:hover {
            background: linear-gradient(135deg, #6b2d5c 0%, #8b3a6d 100%);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(74, 28, 64, 0.5);
        }

        /* Resultado responsivo */
        .result-section {
            background: var(--gradient-3);
            padding: 25px;
            border-radius: 20px;
            color: var(--white);
            text-align: center;
            display: none;
            border: 3px solid var(--purple-vibrant);
            box-shadow: 0 15px 50px rgba(45, 27, 53, 0.5);
            width: 100%;
        }

        .result-section.show {
            display: block;
            animation: fadeInScale 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .result-title {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.1rem, 3vw, 1.3rem);
            margin-bottom: 12px;
            font-weight: 700;
            color: var(--lavender-light);
        }

        .result-value {
            font-family: 'Nunito', sans-serif;
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--white);
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4);
        }

        .result-details {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.85rem, 2.2vw, 1rem);
            opacity: 0.95;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--lavender-light);
            line-height: 1.7;
        }

        /* Error message */
        .error-message {
            background: linear-gradient(145deg, #6b2d5c 0%, #4a1c40 100%);
            color: var(--white);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 18px;
            display: none;
            text-align: center;
            font-weight: 700;
            border: 2px solid var(--purple-vibrant);
            font-family: 'Nunito', sans-serif;
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            width: 100%;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive para ANDROID, iOS, TABLETS */
        @media (max-width: 768px) {
            body {
                padding: 12px;
                font-size: 15px;
            }

            .container {
                padding: 25px;
                border-radius: 20px;
            }

            .logo-image {
                width: 100px;
                height: 100px;
                border-radius: 16px;
            }

            .note-row {
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 15px;
            }

            .btn-delete {
                width: 100%;
                height: 48px;
                margin-top: 8px;
            }

            .buttons-container {
                flex-direction: column;
                gap: 10px;
            }

            .btn {
                width: 100%;
                min-width: 100%;
            }

            .result-section {
                padding: 20px;
            }

            .result-details {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
                font-size: 14px;
            }

            .container {
                padding: 20px;
                border-radius: 16px;
            }

            .logo-image {
                width: 80px;
                height: 80px;
                border-radius: 14px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .note-row {
                padding: 12px;
            }

            .input-group input {
                padding: 12px;
                height: 48px;
                font-size: 1rem;
            }

            .btn {
                padding: 14px 20px;
                font-size: 0.9rem;
                min-height: 52px;
            }

            .result-value {
                font-size: 2.2rem;
            }
        }

        /* Optimización para iOS */
        @supports (-webkit-touch-callout: none) {
            .input-group input {
                -webkit-appearance: none;
                appearance: none;
            }

            .btn {
                -webkit-touch-callout: none;
            }
        }

        /* Optimización para Android */
        @media (hover: none) {
            .btn:hover {
                transform: translateY(-2px);
            }

            .note-row:hover {
                transform: translateY(-1px);
            }
        }

        /* Landscape para móviles */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px;
                max-height: 90vh;
                overflow-y: auto;
            }

            .logo-image {
                width: 70px;
                height: 70px;
            }

            h1 {
                font-size: 1.3rem;
            }
        }

        /* Soporte para touch */
        .btn {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .input-group input {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* Scroll suave */
        .container {
            scroll-behavior: smooth;
        }

        /* Accesibilidad */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="tomyork.jpg" alt="Logo Tom York" class="logo-image">
            <h1>Notas Tom York <3 </h1>
            <p class="subtitle">Calculadora de Promedio ponderado</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="notes-container" id="notesContainer">
            <!-- Las casillas se generan dinámicamente -->
        </div>

        <div class="buttons-container">
            <button class="btn btn-add" id="btnAdd" onclick="addNoteRow()">
                <span>+</span> Agregar otra Casilla
            </button>
            <button class="btn btn-calculate" id="btnCalculate" onclick="calculateAverage()">
                Calcular Promedio
            </button>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-title">Promedio Final</div>
            <div class="result-value" id="resultValue">0.00</div>
            <div class="result-details" id="resultDetails"></div>
        </div>
    </div>

    <script>
        let noteCount = 4;
        const maxNotes = 20;
        const minNotes = 4;

        // Generar las casillas iniciales
        function generateNoteRows() {
            const container = document.getElementById('notesContainer');
            container.innerHTML = '';

            for (let i = 1; i <= noteCount; i++) {
                const row = document.createElement('div');
                row.className = 'note-row';
                row.id = `noteRow${i}`;

                row.innerHTML = `
                    <div>
                        <label>Casilla ${i}</label>
                        <div class="input-group">
                            <input type="number" 
                                   id="note${i}" 
                                   placeholder="Ingresa nota" 
                                   min="0" 
                                   max="100" 
                                   step="0.01"
                                   inputmode="decimal"
                                   required>
                            <span>Nota</span>
                        </div>
                    </div>
                    <div>
                        <label>Porcentaje</label>
                        <div class="input-group">
                            <input type="number" 
                                   id="percent${i}" 
                                   placeholder="Ingresa porcentaje" 
                                   min="0" 
                                   max="100" 
                                   step="0.01"
                                   inputmode="decimal"
                                   required>
                            <span>%</span>
                        </div>
                    </div>
                    <button class="btn-delete" 
                            id="btnDelete${i}" 
                            onclick="deleteNoteRow(${i})" 
                            ${i <= 4 ? 'disabled' : ''}>
                        ×
                    </button>
                `;

                container.appendChild(row);
            }
        }

        // Agregar más casilla
        function addNoteRow() {
            if (noteCount >= maxNotes) {
                showError('Has alcanzado el límite máximo de casillas (20)');
                return;
            }

            noteCount++;
            const container = document.getElementById('notesContainer');

            const row = document.createElement('div');
            row.className = 'note-row';
            row.id = `noteRow${noteCount}`;

            row.innerHTML = `
                <div>
                    <label>Casilla ${noteCount}</label>
                    <div class="input-group">
                        <input type="number" 
                               id="note${noteCount}" 
                               placeholder="Ingresa nota" 
                               min="0" 
                               max="100" 
                               step="0.01"
                               inputmode="decimal"
                               required>
                        <span>Nota</span>
                    </div>
                </div>
                <div>
                    <label>Porcentaje</label>
                    <div class="input-group">
                        <input type="number" 
                               id="percent${noteCount}" 
                               placeholder="Ingresa porcentaje" 
                               min="0" 
                               max="100" 
                               step="0.01"
                               inputmode="decimal"
                               required>
                        <span>%</span>
                    </div>
                </div>
                <button class="btn-delete" 
                        id="btnDelete${noteCount}" 
                        onclick="deleteNoteRow(${noteCount})">
                    ×
                </button>
            `;

            container.appendChild(row);
            hideError();
        }

        // Eliminar casilla
        function deleteNoteRow(index) {
            if (noteCount <= minNotes) {
                showError('Debes mantener al menos 4 casillas');
                return;
            }

            const row = document.getElementById(`noteRow${index}`);
            row.remove();

            noteCount--;

            // Reorganizar las casillas restantes
            const container = document.getElementById('notesContainer');
            const rows = container.getElementsByClassName('note-row');

            for (let i = 0; i < rows.length; i++) {
                const newRow = rows[i];
                newRow.id = `noteRow${i + 1}`;
                newRow.querySelector('label').textContent = `Casilla ${i + 1}`;

                const noteInput = newRow.querySelector('#note' + (i + 2));
                const percentInput = newRow.querySelector('#percent' + (i + 2));
                const deleteBtn = newRow.querySelector('#btnDelete' + (i + 2));

                if (noteInput) {
                    noteInput.id = `note${i + 1}`;
                }
                if (percentInput) {
                    percentInput.id = `percent${i + 1}`;
                }
                if (deleteBtn) {
                    deleteBtn.id = `btnDelete${i + 1}`;
                    deleteBtn.onclick = function() { deleteNoteRow(i + 1); };
                    deleteBtn.disabled = (i + 1 <= 4);
                }
            }

            hideError();
        }

        // Calcular promedio
        function calculateAverage() {
            const errorDiv = document.getElementById('errorMessage');
            const resultSection = document.getElementById('resultSection');
            const resultValue = document.getElementById('resultValue');
            const resultDetails = document.getElementById('resultDetails');

            let totalWeighted = 0;
            let totalPercent = 0;
            let validInputs = 0;
            let details = [];

            for (let i = 1; i <= noteCount; i++) {
                const noteInput = document.getElementById(`note${i}`);
                const percentInput = document.getElementById(`percent${i}`);

                const note = parseFloat(noteInput.value);
                const percent = parseFloat(percentInput.value);

                if (noteInput.value === '' || percentInput.value === '') {
                    showError(`Por favor, completa la Casilla ${i} (nota y porcentaje)`);
                    resultSection.classList.remove('show');
                    noteInput.focus();
                    return;
                }

                if (note < 0 || note > 100) {
                    showError(`La nota de la Casilla ${i} debe estar entre 0 y 100`);
                    resultSection.classList.remove('show');
                    noteInput.focus();
                    return;
                }

                if (percent < 0 || percent > 100) {
                    showError(`El porcentaje de la Casilla ${i} debe estar entre 0 y 100`);
                    resultSection.classList.remove('show');
                    percentInput.focus();
                    return;
                }

                totalWeighted += note * percent;
                totalPercent += percent;
                validInputs++;
                details.push(`Casilla ${i}: ${note} × ${percent}% = ${(note * percent).toFixed(2)}`);
            }

            if (totalPercent === 0) {
                showError('El total de porcentajes debe ser mayor que 0');
                resultSection.classList.remove('show');
                return;
            }

            const average = totalWeighted / totalPercent;

            // Mostrar resultado con scroll suave
            resultValue.textContent = average.toFixed(2);
            resultDetails.innerHTML = `
                <strong>Total de porcentajes:</strong> ${totalPercent.toFixed(2)}%<br>
                <strong>Notas válidas:</strong> ${validInputs}<br>
                <div style="margin-top: 12px; font-size: 0.95em;">
                    ${details.map(d => `<div style="padding: 4px 0;">${d}</div>`).join('')}
                </div>
            `;
            resultSection.classList.add('show');
            hideError();

            // Scroll suave al resultado
            setTimeout(() => {
                resultSection.scrollIntoView({ 
                    behavior: 'smooth', 
                    block: 'center' 
                });
            }, 100);
        }

        // Mostrar mensaje de error
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        // Hiddeno mensaje de error
        function hideError() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.remove('show');
        }

        // Generar las casillas al cargar la página
        generateNoteRows();

        // Evitar zoom doble touch en iOS
        document.addEventListener('touchmove', function(e) {
            if (e.scale !== 1) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
